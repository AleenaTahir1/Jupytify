<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid background -->
  <rect width="100" height="100" rx="18" fill="#1a56db"/>

  <!-- Back notebook page (slightly offset) -->
  <rect x="14" y="18" width="52" height="68" rx="5" fill="#3b82f6"/>

  <!-- Notebook lines -->
  <rect x="22" y="33" width="28" height="3.5" rx="1.5" fill="#93c5fd"/>
  <rect x="22" y="43" width="22" height="3.5" rx="1.5" fill="#93c5fd"/>
  <rect x="22" y="53" width="25" height="3.5" rx="1.5" fill="#93c5fd"/>

  <!-- Front PDF document -->
  <rect x="34" y="14" width="54" height="72" rx="5" fill="white"/>

  <!-- Corner fold -->
