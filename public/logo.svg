  <!-- Bold PDF text -->
  <text x="61" y="58" fill="#dc2626" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="24" text-anchor="middle" dominant-baseline="central" letter-spacing="-1">PDF</text>
